name: Edzéslátogatás frissítés

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Edzéslátogatás frissítés
        run: python3 update_attendance.py

      - name: Commit és push ha változott
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboards/
          git diff --staged --quiet || (
            git commit -m "Edzéslátogatás frissítés (auto)" &&
            git push
          )
